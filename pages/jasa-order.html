<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasa Order Alfagift - VoucherQita</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:380px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h3{
text-align:center;
margin-bottom:20px;
}

label{
font-size:14px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:6px;
}

.hitung{
background:#6b3fa0;
color:white;
}

.order{
background:#1fa67a;
color:white;
}

.alfagift{
background:#e21b23;
color:white;
}

.hasil{
margin-top:15px;
background:#f7f7f7;
padding:12px;
border-radius:6px;
font-size:14px;
}

.note{
font-size:13px;
color:#666;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h3>Jasa Order Alfagift</h3>

<label>Nama Barang / PLU</label>
<input type="text" id="produk" placeholder="Contoh: Syrup Marjan">

<label>Harga Toko (per pcs)</label>
<input type="number" id="harga" placeholder="Contoh: 17500">

<p class="note">
Tidak tahu harga toko?<br>
Silakan cek harga produk melalui Alfagift terlebih dahulu.
</p>

<a href="https://alfagift.id" target="_blank">
<button type="button" class="alfagift">Cek Harga di Alfagift</button>
</a>

<label>Jumlah Barang</label>
<input type="number" id="jumlah" placeholder="Contoh: 12">

<button class="hitung" onclick="hitung()">Hitung Harga</button>

<div class="hasil" id="hasil"></div>

<div id="opsi"></div>

<p class="note" style="margin-top:15px;">
Harga toko mengikuti harga yang tertera di aplikasi Alfagift.<br>
Silakan gunakan harga dari Alfagift sebagai acuan sebelum melakukan order.
</p>

</div>

<script>

let total=0;
let voucher=0;
let potongan=0;
let bayar=0;

function rupiah(angka){
return new Intl.NumberFormat('id-ID').format(angka);
}

function hitung(){

let harga=document.getElementById("harga").value;
let jumlah=document.getElementById("jumlah").value;

if(harga=="" || jumlah==""){
alert("Mohon isi harga dan jumlah barang");
return;
}

total=harga*jumlah;

voucher=Math.floor(total/100000);

potongan=voucher*10000;

bayar=total-potongan;

document.getElementById("hasil").innerHTML=
"Total Belanja : <b>"+rupiah(total)+"</b><br>"+
"Voucher Digunakan : "+voucher+"<br>"+
"Diskon Jasa : "+rupiah(potongan)+"<br>"+
"<b>Total Bayar : "+rupiah(bayar)+"</b>";

document.getElementById("opsi").innerHTML=`

<p style="margin-top:10px;"><b>Apakah Anda sudah memiliki toko Alfamart tujuan?</b></p>

<button onclick="punyaToko()">Ya, Sudah Ada Toko</button>

<button onclick="belumToko()">Belum Ada Toko</button>

`;

}

function punyaToko(){

document.getElementById("opsi").innerHTML=`

<label>Nama / Alamat Toko Alfamart</label>
<input type="text" id="toko" placeholder="Contoh: Alfamart Jengki Kudus">

<button class="order" onclick="kirimWA()">Kirim Order ke WhatsApp</button>

`;

}

function kirimWA(){

let produk=document.getElementById("produk").value;
let harga=document.getElementById("harga").value;
let jumlah=document.getElementById("jumlah").value;
let toko=document.getElementById("toko").value;

let pesan=
`ORDER JASA BELANJA VOUCHERQITA

Produk : ${produk}
Harga Toko : ${harga}
Jumlah : ${jumlah}

Total Belanja : ${rupiah(total)}
Voucher Digunakan : ${voucher}
Diskon Jasa : ${rupiah(potongan)}

Total Bayar : ${rupiah(bayar)}

Toko Alfamart :
${toko}
`;

let url="https://api.whatsapp.com/send?phone=6285763492378&text="+encodeURIComponent(pesan);

window.open(url);

}

function belumToko(){

let url="https://api.whatsapp.com/send?phone=6285763492378&text="+encodeURIComponent(
"Halo CS VoucherQita, saya ingin menggunakan jasa order Alfagift tetapi belum memiliki toko tujuan. Saya akan mengirim share lokasi saya."
);
  
window.open(url);

}

</script>

</body>
</html>
